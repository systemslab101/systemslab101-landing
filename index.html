<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systems Lab 101</title>
  <meta name="description" content="I test simple ways to work smarter using AI, Canva, and everyday workflows, and share what works." />
  <style>
    :root {
      --bg: #ffffff;
      --text: #202020;
      --muted: #666666;
      --accent: #f36b7f;
      --accent-hover: #ea5c72;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      margin: 0 auto 2rem;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtext {
      margin: 0 auto 2.5rem;
      max-width: 560px;
      font-size: 1.3rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .cta-button {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--accent);
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.2s ease;
    }

    .cta-button:hover {
      background: var(--accent-hover);
    }

    @media (max-width: 560px) {
      .subtext { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo">
      <!-- IMPORTANT: upload your logo file to GitHub and name it logo.png -->
      <img src="logo.png" alt="Systems Lab logo">
    </div>

    <h1>Systems Lab 101</h1>

    <p class="subtext">
      I test simple ways to work smarter using AI, Canva, and everyday workflows, and share what works.
    </p>

    <a 
      href="https://systemslab101.substack.com/?utm_campaign=profile_chips"
      class="cta-button"
    >
      See how it works →
    </a>
  </main>
</body>
</html>
