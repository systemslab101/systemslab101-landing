<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systemslab101</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 720px;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      line-height: 1.2;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0;
    }

    li {
      margin: 0.5rem 0;
      font-size: 1.05rem;
    }

    .accent {
      color: #e11d48;
      font-weight: 600;
      margin-top: 2rem;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Systems that help you build, create, and improve faster.</h1>

    <p>
      Documenting how I work smarter with AI, workflows, and automation as a creator.
    </p>

    <ul>
      <li>simple apps</li>
      <li>landing pages</li>
      <li>creator workflows</li>
      <li>AI-assisted systems</li>
    </ul>

    <p class="accent">Follow along on Substack.</p>
  </div>
</body>
</html>
